version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
      - 'checkout '
      - mkdir -p .pip_cache
blocks:
  - name: "\U0001F9EA Test"
    dependencies: []
    task:
      jobs:
        - name: Install Dependencies
          commands:
            - pip install pytest requests flask coverage locust
