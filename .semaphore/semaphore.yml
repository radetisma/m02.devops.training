version: v1.0
name: "\U0001F40D Python CI/CD Pipeline"
agent:
  machine:
    type: a2-standard-4
    os_image: macos-xcode16
auto_cancel:
  queued:
    when: 'true'
fail_fast:
  cancel:
    when: branch != 'main'
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
      - checkout
blocks:
  - name: "\U0001F4E6 Setup Dependencies"
    dependencies: []
    task:
      jobs:
        - name: "\U0001F4E6 Install dependencies"
          commands:
            - pip install pytest requests flask coverage locust
            - cache store
after_pipeline:
  task:
    jobs:
      - name: "\U0001F4CA Merge reports"
        commands:
          - test-results gen-pipeline-report
